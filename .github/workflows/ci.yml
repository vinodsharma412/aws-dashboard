# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CI — Code quality checks for developers
#
# Triggers:
#   - Every push to `develop`
#   - Every pull request targeting `main`
#
# What it checks:
#   1. Python lint  — ruff (style, unused imports, bugs)
#   2. Frontend build — confirms React compiles without errors
#
# No deployment happens here.
# Merge to main only when this passes.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Lint & Build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python lint ──────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt ruff -q

      - name: Lint — ruff
        run: ruff check backend/app/

      # ── Frontend build check ─────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_STAGE: staging
          REACT_APP_API_URL: http://localhost/api/v1
          REACT_APP_SSE_URL: http://localhost
          PUBLIC_URL: /
          CI: false
