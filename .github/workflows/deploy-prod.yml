# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CI/CD — PRODUCTION stage
#
# Trigger:  push to `main` branch
# Target:   STAGE=prod  (uses prod DynamoDB tables, no prefix)
#
# Safety gates:
#   • Lint + build must pass before deployment
#   • Manual approval gate via GitHub Environments (requires reviewer)
#     Configure: Settings → Environments → prod → Required reviewers
#   • Health check after deployment confirms API is responding
#
# Git workflow:
#   develop  ──→  pull request ──→  release/x.y.z  ──→  pull request ──→  main
#      ↓                                ↓                                    ↓
#     DEV                              QC                                  PROD
#
# Required GitHub Secrets (same as dev/qc plus PROD_API_URL, PROD_SSE_URL)
# Required GitHub Environment: "prod"  (with required reviewers)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Deploy — PROD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  STAGE: prod
  AWS_REGION: ap-south-1
  REMOTE_DIR: /opt/nse
  SERVICE_API: nse-api
  SERVICE_WORKER: nse-worker

jobs:
  # ── Job 1: Lint & build ──────────────────────────────────────────────────────
  lint-test:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint backend
        run: |
          pip install ruff -q
          ruff check backend/app/

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (prod)
        run: |
          npm ci
          npm run build
        working-directory: frontend
        env:
          REACT_APP_STAGE: prod
          REACT_APP_API_URL: ${{ secrets.PROD_API_URL }}
          REACT_APP_SSE_URL: ${{ secrets.PROD_SSE_URL }}
          CI: false

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-prod-build
          path: frontend/build/
          retention-days: 3

  # ── Job 2: Deploy (requires manual approval) ─────────────────────────────────
  deploy-backend:
    name: Deploy Backend (EC2)
    needs: lint-test
    runs-on: ubuntu-latest
    environment: prod          # ← requires reviewer approval in GitHub settings
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/nse-key.pem
          chmod 600 ~/.ssh/nse-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend to EC2
        run: |
          rsync -az --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='worker.pid' \
            -e "ssh -i ~/.ssh/nse-key.pem" \
            backend/ ubuntu@${{ secrets.EC2_HOST }}:${{ env.REMOTE_DIR }}/

      - name: Install deps + rolling restart
        run: |
          ssh -i ~/.ssh/nse-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ${{ env.REMOTE_DIR }}
            source venv/bin/activate
            pip install -r requirements.txt -q
            # Restart worker first (drains queue), then API
            sudo systemctl restart ${{ env.SERVICE_WORKER }}
            sleep 3
            sudo systemctl restart ${{ env.SERVICE_API }}
            echo "Deployment complete. Stage=prod"
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          curl -fsS "http://${{ secrets.EC2_HOST }}/api/v1/health/" || exit 1
          echo "Production health check passed."

      - name: Notify deployment to SNS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          SNS_ARN=$(aws ssm get-parameter \
            --name "/nse/prod/sns-alerts-arn" \
            --query "Parameter.Value" --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          if [ -n "$SNS_ARN" ]; then
            aws sns publish \
              --topic-arn "$SNS_ARN" \
              --subject "[NSE PROD] Deployment successful" \
              --message "NSE Stock Dashboard deployed to PROD at $(date -u). Commit: ${{ github.sha }} by ${{ github.actor }}" \
              --region ${{ env.AWS_REGION }} || true
          fi

  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    needs: lint-test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-prod-build
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload hashed static assets (1-year cache)
        run: |
          aws s3 sync build/static/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/static/ \
            --cache-control "max-age=31536000, immutable" \
            --delete

      - name: Upload index.html + root files (no cache)
        run: |
          aws s3 sync build/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "static/*" \
            --delete

      - name: Invalidate CloudFront distribution
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/nse/prod/cloudfront-dist-id" \
            --query "Parameter.Value" --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
          echo "CloudFront cache invalidated: $DIST_ID"
