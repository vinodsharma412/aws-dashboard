# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Deploy Pipeline — main branch only
#
# Trigger: push to `main`  (merge develop → main to deploy)
#
# Flow:
#   1. Quality Gate   — lint · security scan · dependency audit · frontend build
#   2. Deploy STAGING — auto (staging AWS account)
#   3. Smoke Tests    — full API tests against live staging
#   4. Deploy PROD    — requires manual approval (prod AWS account)
#
# Prod only deploys when ALL of the above pass.
#
# GitHub Secrets required (Settings → Secrets → Actions):
#   STAGING_EC2_HOST              Staging EC2 Elastic IP
#   STAGING_EC2_SSH_KEY           Full .pem key for staging EC2
#   STAGING_AWS_ACCESS_KEY_ID     IAM key for staging account
#   STAGING_AWS_SECRET_ACCESS_KEY IAM secret for staging account
#   STAGING_S3_FRONTEND_BUCKET    nse-frontend-<staging-account-id>
#   STAGING_API_URL               http://<STAGING_EC2_HOST>/api/v1
#   STAGING_SSE_URL               http://<STAGING_EC2_HOST>
#   EC2_HOST                      Prod EC2 Elastic IP
#   EC2_SSH_KEY                   Full .pem key for prod EC2
#   AWS_ACCESS_KEY_ID             IAM key for prod account
#   AWS_SECRET_ACCESS_KEY         IAM secret for prod account
#   S3_FRONTEND_BUCKET            nse-frontend-<prod-account-id>
#   PROD_API_URL                  http://<EC2_HOST>/api/v1
#   PROD_SSE_URL                  http://<EC2_HOST>
#
# GitHub Environments required (Settings → Environments):
#   staging  — no protection rules
#   prod     — Required reviewers: add your GitHub username
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:

  # ── 1. Quality Gate ──────────────────────────────────────────────────────────
  # All checks must pass before any deployment happens.
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps + tools
        run: pip install -r backend/requirements.txt ruff bandit pip-audit -q

      # ── Code style & lint ──────────────────────────────────────────────────
      - name: Lint — ruff
        run: ruff check backend/app/

      # ── Security scan — find common vulnerabilities in Python code ─────────
      - name: Security — bandit
        run: |
          bandit -r backend/app/ \
            --severity-level medium \
            --confidence-level medium \
            -x backend/app/tests \
            --quiet

      # ── Dependency audit — check for known CVEs in installed packages ──────
      - name: Dependency audit — pip-audit
        run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2023-62

      # ── Frontend ───────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        run: npm ci
        working-directory: frontend

      - name: Frontend dependency audit — npm audit
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true   # warn only — frontend deps often have minor issues

      - name: Build frontend — STAGING
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_STAGE: staging
          REACT_APP_API_URL: ${{ secrets.STAGING_API_URL }}
          REACT_APP_SSE_URL: ${{ secrets.STAGING_SSE_URL }}
          PUBLIC_URL: /
          CI: false

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-staging
          path: frontend/build/
          retention-days: 1

      - name: Build frontend — PROD
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_STAGE: prod
          REACT_APP_API_URL: ${{ secrets.PROD_API_URL }}
          REACT_APP_SSE_URL: ${{ secrets.PROD_SSE_URL }}
          PUBLIC_URL: /
          CI: false

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-prod
          path: frontend/build/
          retention-days: 1

  # ── 2. Deploy STAGING ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy STAGING
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH — staging EC2
        env:
          SSH_KEY: ${{ secrets.STAGING_EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/nse-key.pem
          chmod 600 ~/.ssh/nse-key.pem
          ssh-keyscan -H "${{ secrets.STAGING_EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync backend → staging EC2 /opt/nse
        run: |
          rsync -az --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='worker.pid' \
            -e "ssh -i ~/.ssh/nse-key.pem" \
            backend/ ubuntu@${{ secrets.STAGING_EC2_HOST }}:/opt/nse/backend/

      - name: Install deps + restart services
        run: |
          ssh -i ~/.ssh/nse-key.pem ubuntu@${{ secrets.STAGING_EC2_HOST }} << 'EOF'
            set -e
            cd /opt/nse
            [ -d venv ] || python3 -m venv venv
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart nse-api
            sudo systemctl restart nse-worker || true
          EOF

      - name: Health check — STAGING
        run: |
          sleep 90
          curl -fsS "http://${{ secrets.STAGING_EC2_HOST }}/api/v1/health/" \
            && echo "STAGING health check passed"

      - name: Download staging frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-staging
          path: build/

      - name: Configure AWS credentials — staging account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend → staging S3
        run: |
          aws s3 sync build/static/ \
            s3://${{ secrets.STAGING_S3_FRONTEND_BUCKET }}/static/ \
            --cache-control "max-age=31536000,immutable" --delete
          aws s3 sync build/ \
            s3://${{ secrets.STAGING_S3_FRONTEND_BUCKET }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "static/*" --delete

  # ── 3. Smoke Tests — run against live staging ────────────────────────────────
  # All 10 API tests must pass before prod is available for approval.
  smoke-tests:
    name: Smoke Tests — STAGING
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests against staging
        run: bash infrastructure/scripts/test_staging.sh ${{ secrets.STAGING_EC2_HOST }}

  # ── 4. Deploy PROD ───────────────────────────────────────────────────────────
  # Requires manual approval in GitHub UI after smoke tests pass.
  deploy-prod:
    name: Deploy PROD
    needs: smoke-tests
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH — prod EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/nse-key.pem
          chmod 600 ~/.ssh/nse-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync backend → prod EC2 /opt/nse
        run: |
          rsync -az --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='worker.pid' \
            -e "ssh -i ~/.ssh/nse-key.pem" \
            backend/ ubuntu@${{ secrets.EC2_HOST }}:/opt/nse/backend/

      - name: Install deps + restart services
        run: |
          ssh -i ~/.ssh/nse-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /opt/nse
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart nse-worker
            sleep 3
            sudo systemctl restart nse-api
          EOF

      - name: Health check — PROD
        run: |
          sleep 90
          curl -fsS "http://${{ secrets.EC2_HOST }}/api/v1/health/" \
            && echo "PROD health check passed"

      - name: Download prod frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-prod
          path: build/

      - name: Configure AWS credentials — prod account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend → prod S3
        run: |
          aws s3 sync build/static/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/static/ \
            --cache-control "max-age=31536000,immutable" --delete
          aws s3 sync build/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "static/*" --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/nse/cloudfront-dist-id" \
            --query "Parameter.Value" --output text 2>/dev/null || echo "")
          [ -n "$DIST_ID" ] && aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" --paths "/*" || true
