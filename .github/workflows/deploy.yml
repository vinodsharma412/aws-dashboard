# CI/CD — auto-deploy on push to main
#
# What happens on every push to main:
#   1. Backend job  → SSH into EC2 → git pull → pip install → restart services
#   2. Frontend job → npm build with prod env vars → aws s3 sync
#
# Both jobs run in parallel after the code is pushed.
#
# ── GitHub Secrets required ────────────────────────────────────────────────────
# Go to: GitHub repo → Settings → Secrets and variables → Actions → New secret
#
#   EC2_HOST              Public IP of your EC2 instance  e.g. 13.233.1.2
#   EC2_SSH_KEY           Contents of your .pem file      (paste the full key)
#   AWS_ACCESS_KEY_ID     IAM user with S3 + CloudFront permissions
#   AWS_SECRET_ACCESS_KEY Matching secret
#   REACT_APP_API_URL     https://<api-gw-id>.execute-api.ap-south-1.amazonaws.com/prod/api/v1
#   REACT_APP_SSE_URL     http://<ec2-public-ip>
#   S3_FRONTEND_BUCKET    nse-frontend-<account-id>
#
# ── Free tier note ─────────────────────────────────────────────────────────────
# GitHub Actions is free for public repos and 2,000 min/month for private repos.
# This workflow typically runs in under 3 minutes.

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:

  # ── Deploy backend to EC2 ───────────────────────────────────────────────────
  deploy-backend:
    name: Backend → EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2.pem
          chmod 600 /tmp/ec2.pem

      - name: Sync code to EC2
        run: |
          rsync -az --delete \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            --exclude ".env" \
            --exclude "venv/" \
            -e "ssh -i /tmp/ec2.pem -o StrictHostKeyChecking=no" \
            backend/ \
            ubuntu@${{ secrets.EC2_HOST }}:/opt/nse/backend/

      - name: Install dependencies + restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/nse/backend
            source venv/bin/activate
            pip install -r requirements.txt -q
            sudo systemctl restart nse-api nse-worker
            sleep 3
            curl -sf http://localhost:9000/api/v1/health/ || (journalctl -u nse-api -n 30 && exit 1)

      - name: Confirm deployment
        run: |
          echo "✓ Backend deployed to ${{ secrets.EC2_HOST }}"

  # ── Build and deploy frontend to S3 ────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_SSE_URL: ${{ secrets.REACT_APP_SSE_URL }}
          CI: false                # treat React warnings as warnings, not errors
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy HTML to S3 (no-cache)
        run: |
          aws s3 sync frontend/build/ s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --delete \
            --exclude "static/*" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Deploy static assets to S3 (long cache)
        run: |
          aws s3 sync frontend/build/static/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/static \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Confirm deployment
        run: |
          echo "✓ Frontend deployed to s3://${{ secrets.S3_FRONTEND_BUCKET }}"
          echo "  http://${{ secrets.S3_FRONTEND_BUCKET }}.s3-website.ap-south-1.amazonaws.com"
