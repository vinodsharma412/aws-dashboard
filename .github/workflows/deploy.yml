# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Promotion pipeline:  DEV → QC → PROD
#
# Trigger:  push to `develop`
#
# Flow:
#   1. Lint & Test  (ruff + npm build)
#   2. Deploy DEV   → health check  (auto)
#   3. Deploy QC    → health check  (auto, only if DEV passes)
#   4. Deploy PROD  → health check  (requires manual approval in GitHub UI)
#
# Setup required (one-time):
#   GitHub → Settings → Environments
#     dev   — no protection
#     qc    — no protection
#     prod  — add Required reviewers (your GitHub username)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Deploy Pipeline

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:

  # ── 1. Lint & Test ────────────────────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps + lint
        run: |
          pip install -r backend/requirements.txt ruff -q
          ruff check backend/app/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (dev)
        run: npm ci && npm run build
        working-directory: frontend
        env:
          REACT_APP_STAGE: dev
          REACT_APP_API_URL: ${{ secrets.DEV_API_URL }}
          REACT_APP_SSE_URL: ${{ secrets.DEV_SSE_URL }}
          PUBLIC_URL: /dev
          CI: false

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  # ── 2. Deploy DEV ─────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy DEV
    needs: lint-test
    runs-on: ubuntu-latest
    environment: dev
    env:
      REMOTE_DIR: /opt/nse-dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/nse-key.pem
          chmod 600 ~/.ssh/nse-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync backend
        run: |
          rsync -az --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='worker.pid' \
            -e "ssh -i ~/.ssh/nse-key.pem" \
            backend/ ubuntu@${{ secrets.EC2_HOST }}:${{ env.REMOTE_DIR }}/backend/

      - name: Install deps + restart
        run: |
          ssh -i ~/.ssh/nse-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /opt/nse-dev
            [ -d venv ] || python3 -m venv venv
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart nse-api-dev
            sudo systemctl restart nse-worker-dev || true
          EOF

      - name: Health check
        run: |
          sleep 40
          curl -fsS "http://${{ secrets.EC2_HOST }}/dev/api/v1/health/" \
            && echo "DEV health check passed"

      - name: Deploy frontend to S3 (dev)
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend → S3
        run: |
          aws s3 sync build/static/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/dev/static/ \
            --cache-control "max-age=31536000,immutable" --delete
          aws s3 sync build/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/dev/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "static/*" --delete

  # ── 3. Deploy QC ──────────────────────────────────────────────────────────────
  deploy-qc:
    name: Deploy QC
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qc
    env:
      REMOTE_DIR: /opt/nse-qc
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/nse-key.pem
          chmod 600 ~/.ssh/nse-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync backend
        run: |
          rsync -az --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='worker.pid' \
            -e "ssh -i ~/.ssh/nse-key.pem" \
            backend/ ubuntu@${{ secrets.EC2_HOST }}:${{ env.REMOTE_DIR }}/backend/

      - name: Install deps + restart
        run: |
          ssh -i ~/.ssh/nse-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /opt/nse-qc
            [ -d venv ] || python3 -m venv venv
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart nse-api-qc
            sudo systemctl restart nse-worker-qc || true
          EOF

      - name: Health check
        run: |
          sleep 40
          curl -fsS "http://${{ secrets.EC2_HOST }}/qc/api/v1/health/" \
            && echo "QC health check passed"

  # ── 4. Deploy PROD (requires approval) ───────────────────────────────────────
  deploy-prod:
    name: Deploy PROD
    needs: deploy-qc
    runs-on: ubuntu-latest
    environment: prod          # ← reviewer must approve in GitHub UI before this runs
    env:
      REMOTE_DIR: /opt/nse
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/nse-key.pem
          chmod 600 ~/.ssh/nse-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync backend
        run: |
          rsync -az --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='worker.pid' \
            -e "ssh -i ~/.ssh/nse-key.pem" \
            backend/ ubuntu@${{ secrets.EC2_HOST }}:${{ env.REMOTE_DIR }}/backend/

      - name: Install deps + restart
        run: |
          ssh -i ~/.ssh/nse-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /opt/nse
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart nse-worker
            sleep 3
            sudo systemctl restart nse-api
          EOF

      - name: Health check
        run: |
          sleep 40
          curl -fsS "http://${{ secrets.EC2_HOST }}/api/v1/health/" \
            && echo "PROD health check passed"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend → S3 (prod)
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: build/

      - name: Upload frontend → S3
        run: |
          aws s3 sync build/static/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/static/ \
            --cache-control "max-age=31536000,immutable" --delete
          aws s3 sync build/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "static/*" --delete

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/nse/prod/cloudfront-dist-id" \
            --query "Parameter.Value" --output text 2>/dev/null || echo "")
          [ -n "$DIST_ID" ] && aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" --paths "/*" || true
