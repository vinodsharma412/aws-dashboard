# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Two-stage promotion pipeline:  STAGING → PROD
#
# Trigger:  push to `develop`
#
# Both stages run on ONE EC2 instance in ONE AWS account.
# Isolation is enforced by DynamoDB table prefix (stg_) and separate
# SQS queues, SNS topics, and SSM paths per stage.
#
# Flow:
#   1. Lint & Test  — ruff + build both stage frontends
#   2. Deploy STAGING — auto, every push
#   3. Deploy PROD    — requires manual approval in GitHub UI
#
# GitHub Secrets required (Settings → Secrets → Actions):
#   EC2_HOST              EC2 public IP (Elastic IP)
#   EC2_SSH_KEY           Full contents of .pem key file
#   AWS_ACCESS_KEY_ID     IAM access key
#   AWS_SECRET_ACCESS_KEY IAM secret key
#   S3_FRONTEND_BUCKET    nse-frontend-<account-id>
#   STAGING_API_URL       http://<EC2_HOST>/staging/api/v1
#   STAGING_SSE_URL       http://<EC2_HOST>
#   PROD_API_URL          http://<EC2_HOST>/api/v1
#   PROD_SSE_URL          http://<EC2_HOST>
#
# GitHub Environments required (Settings → Environments):
#   staging  — no protection rules
#   prod     — Required reviewers: add your GitHub username
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Deploy Pipeline

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:

  # ── 1. Lint & Test + build both frontends ─────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps + lint
        run: |
          pip install -r backend/requirements.txt ruff -q
          ruff check backend/app/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        run: npm ci
        working-directory: frontend

      - name: Build frontend — STAGING
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_STAGE: staging
          REACT_APP_API_URL: ${{ secrets.STAGING_API_URL }}
          REACT_APP_SSE_URL: ${{ secrets.STAGING_SSE_URL }}
          PUBLIC_URL: /staging
          CI: false

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-staging
          path: frontend/build/
          retention-days: 1

      - name: Build frontend — PROD
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_STAGE: prod
          REACT_APP_API_URL: ${{ secrets.PROD_API_URL }}
          REACT_APP_SSE_URL: ${{ secrets.PROD_SSE_URL }}
          PUBLIC_URL: /
          CI: false

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-prod
          path: frontend/build/
          retention-days: 1

  # ── 2. Deploy STAGING (auto on every push) ────────────────────────────────
  deploy-staging:
    name: Deploy STAGING
    needs: lint-test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/nse-key.pem
          chmod 600 ~/.ssh/nse-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync backend → /opt/nse-staging
        run: |
          rsync -az --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='worker.pid' \
            -e "ssh -i ~/.ssh/nse-key.pem" \
            backend/ ubuntu@${{ secrets.EC2_HOST }}:/opt/nse-staging/backend/

      - name: Install deps + restart staging services
        run: |
          ssh -i ~/.ssh/nse-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /opt/nse-staging
            [ -d venv ] || python3 -m venv venv
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart nse-api-staging
            sudo systemctl restart nse-worker-staging || true
          EOF

      - name: Health check — STAGING
        run: |
          sleep 40
          curl -fsS "http://${{ secrets.EC2_HOST }}/staging/api/v1/health/" \
            && echo "STAGING health check passed"

      - name: Download staging frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-staging
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend → S3 /staging/
        run: |
          aws s3 sync build/static/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/staging/static/ \
            --cache-control "max-age=31536000,immutable" --delete
          aws s3 sync build/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/staging/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "static/*" --delete

  # ── 3. Deploy PROD (requires approval in GitHub UI) ──────────────────────
  deploy-prod:
    name: Deploy PROD
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod          # reviewer must approve before this job runs
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/nse-key.pem
          chmod 600 ~/.ssh/nse-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync backend → /opt/nse
        run: |
          rsync -az --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='worker.pid' \
            -e "ssh -i ~/.ssh/nse-key.pem" \
            backend/ ubuntu@${{ secrets.EC2_HOST }}:/opt/nse/backend/

      - name: Install deps + restart prod services
        run: |
          ssh -i ~/.ssh/nse-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /opt/nse
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart nse-worker
            sleep 3
            sudo systemctl restart nse-api
          EOF

      - name: Health check — PROD
        run: |
          sleep 40
          curl -fsS "http://${{ secrets.EC2_HOST }}/api/v1/health/" \
            && echo "PROD health check passed"

      - name: Download prod frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-prod
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend → S3 root (prod)
        run: |
          aws s3 sync build/static/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/static/ \
            --cache-control "max-age=31536000,immutable" --delete
          aws s3 sync build/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "static/*" --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/nse/cloudfront-dist-id" \
            --query "Parameter.Value" --output text 2>/dev/null || echo "")
          [ -n "$DIST_ID" ] && aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" --paths "/*" || true
