# /etc/nginx/sites-available/nse
# Nginx reverse proxy — one stage per EC2 (staging account or prod account).
#
# Each AWS account has its own EC2. This same nginx.conf is deployed on both.
# FastAPI runs on port 9000 in both accounts.
#
# Routing:
#   /api/  →  FastAPI :9000
#   /docs  →  FastAPI :9000  (Swagger UI)
#
# Install:
#   sudo cp infrastructure/scripts/nginx.conf /etc/nginx/sites-available/nse
#   sudo ln -sf /etc/nginx/sites-available/nse /etc/nginx/sites-enabled/nse
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API + SSE ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9000;

        # SSE: disable buffering so scraping progress streams to the browser
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;
    }

    # ── Swagger UI / OpenAPI ─────────────────────────────────────────────────
    location /docs        { proxy_pass http://127.0.0.1:9000; }
    location /openapi.json { proxy_pass http://127.0.0.1:9000; }
    location /redoc       { proxy_pass http://127.0.0.1:9000; }

    # ── Nginx health (no backend needed) ─────────────────────────────────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
}
