# /etc/nginx/sites-available/nse
# Nginx reverse proxy — two stages on one EC2.
#
# Routing:
#   /staging/api/  →  FastAPI :9001  (staging — stg_ prefixed DynamoDB)
#   /api/          →  FastAPI :9000  (prod    — no prefix)
#
# Install:
#   sudo cp infrastructure/scripts/nginx.conf /etc/nginx/sites-available/nse
#   sudo ln -sf /etc/nginx/sites-available/nse /etc/nginx/sites-enabled/nse
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── STAGING: /staging/api/ → :9001 ───────────────────────────────────────
    location /staging/api/ {
        rewrite ^/staging(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:9001;

        # SSE: disable buffering so scraping progress streams to the browser
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;
    }

    location /staging/docs       { rewrite ^/staging(/.*)$ $1 break; proxy_pass http://127.0.0.1:9001; }
    location /staging/openapi.json { rewrite ^/staging(/.*)$ $1 break; proxy_pass http://127.0.0.1:9001; }
    location /staging/redoc      { rewrite ^/staging(/.*)$ $1 break; proxy_pass http://127.0.0.1:9001; }

    # ── PROD: /api/ → :9000 ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9000;

        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;
    }

    location /docs        { proxy_pass http://127.0.0.1:9000; }
    location /openapi.json { proxy_pass http://127.0.0.1:9000; }
    location /redoc       { proxy_pass http://127.0.0.1:9000; }

    # ── Nginx health (no backend needed) ─────────────────────────────────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
}
