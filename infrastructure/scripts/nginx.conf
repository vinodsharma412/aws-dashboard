# /etc/nginx/sites-available/nse
# Nginx reverse proxy — single-stage EC2
#
# Each EC2 instance hosts exactly one stage (dev OR qc OR prod).
# The STAGE environment variable in /opt/nse/.env controls which
# DynamoDB tables and SSM secrets the application uses.
#
# Install:
#   sudo cp infrastructure/scripts/nginx.conf /etc/nginx/sites-available/nse
#   sudo ln -sf /etc/nginx/sites-available/nse /etc/nginx/sites-enabled/nse
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# All three stages share identical nginx config — only the backend
# process (port 9000) behaves differently based on STAGE.

server {
    listen 80;
    server_name _;   # accepts any hostname or IP

    # ── Shared proxy headers ──────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API + SSE: /api/ → FastAPI :9000 ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9000;

        # Required for SSE (Server-Sent Events) — disables response buffering
        # so progress updates reach the browser immediately
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;
    }

    # ── Swagger / OpenAPI UI ──────────────────────────────────────────────────
    location /docs        { proxy_pass http://127.0.0.1:9000; }
    location /openapi.json { proxy_pass http://127.0.0.1:9000; }
    location /redoc       { proxy_pass http://127.0.0.1:9000; }

    # ── Nginx health check (returns 200 without hitting FastAPI) ──────────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
}
