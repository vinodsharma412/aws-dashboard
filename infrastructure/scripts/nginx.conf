# /etc/nginx/sites-available/nse
# Nginx reverse proxy for NSE Stock Dashboard — all three stages.
#
# Copy to: sudo cp nginx.conf /etc/nginx/sites-available/nse
# Enable:  sudo ln -sf /etc/nginx/sites-available/nse /etc/nginx/sites-enabled/nse
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx
#
# Stage routing on port 80:
#   /api/      →  127.0.0.1:9000  (prod)
#   /dev/api/  →  127.0.0.1:9001  (dev,  path prefix /dev stripped before forwarding)
#   /qc/api/   →  127.0.0.1:9002  (qc,   path prefix /qc  stripped before forwarding)
#
# Direct port access also works if the EC2 security group allows it:
#   :9000  prod
#   :9001  dev
#   :9002  qc

server {
    listen 80;
    server_name _;   # accepts any hostname (EC2 public IP or domain)

    # ── Shared proxy settings ─────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── PROD: /api/ → :9000 ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9000;

        # Required for SSE (Server-Sent Events) streaming
        proxy_set_header Connection '';
        proxy_buffering            off;
        proxy_cache                off;
        chunked_transfer_encoding  on;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;
    }

    location /docs       { proxy_pass http://127.0.0.1:9000; }
    location /openapi.json { proxy_pass http://127.0.0.1:9000; }
    location /redoc      { proxy_pass http://127.0.0.1:9000; }

    # ── DEV: /dev/api/ → :9001  (strips /dev prefix before forwarding) ─────────
    location /dev/api/ {
        rewrite ^/dev(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:9001;

        proxy_set_header Connection '';
        proxy_buffering            off;
        proxy_cache                off;
        chunked_transfer_encoding  on;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;
    }

    location /dev/docs      { rewrite ^/dev(/.*)$ $1 break; proxy_pass http://127.0.0.1:9001; }
    location /dev/openapi.json { rewrite ^/dev(/.*)$ $1 break; proxy_pass http://127.0.0.1:9001; }

    # ── QC: /qc/api/ → :9002  (strips /qc prefix before forwarding) ──────────
    location /qc/api/ {
        rewrite ^/qc(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:9002;

        proxy_set_header Connection '';
        proxy_buffering            off;
        proxy_cache                off;
        chunked_transfer_encoding  on;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;
    }

    location /qc/docs      { rewrite ^/qc(/.*)$ $1 break; proxy_pass http://127.0.0.1:9002; }
    location /qc/openapi.json { rewrite ^/qc(/.*)$ $1 break; proxy_pass http://127.0.0.1:9002; }

    # ── Static files (prod only — dev/qc use direct port access) ─────────────
    location /static/ {
        proxy_pass http://127.0.0.1:9000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Nginx health check (returns 200 immediately, no backend needed) ────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
}
